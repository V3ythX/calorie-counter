name: Test WSL Runner

on:
  workflow_dispatch  # Ручной запуск

jobs:
  test:
    runs-on: self-hosted  # или self-hosted, если добавили метку wsl
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Show system info
        run: |
          echo "OS: $(uname -a)"
          echo "Current user: $(whoami)"
          echo "Current directory: $(pwd)"
          echo "CPU cores: $(nproc)"
          echo "Memory: $(free -h)"
      
      - name: Test WSL specific features
        run: |
          # Проверка, что мы в WSL
          if grep -q Microsoft /proc/version; then
            echo "✅ Running in WSL"
          else
            echo "❌ Not in WSL"
          fi
          
          # Проверка доступа к Windows дискам
          ls /mnt/c/ 2>/dev/null && echo "✅ Windows drives accessible" || echo "❌ No Windows access"
      
      - name: Run simple task
        run: |
          echo "Hello from WSL Runner!"
          echo "Test completed at $(date)"
